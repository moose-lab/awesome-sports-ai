<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">LLM Match Commentator sample output</title>
  <desc id="desc">A screenshot-style preview of generated bilingual match commentary for USA vs Mexico.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d1325"/>
      <stop offset="100%" stop-color="#18253f"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <style>
      .title { fill: #f8fafc; font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .meta { fill: #94a3b8; font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #38bdf8; font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .04em; }
      .event { fill: #f8fafc; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .copy { fill: #dbeafe; font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .accent { fill: #22c55e; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .code { fill: #a7f3d0; font: 600 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <rect x="42" y="42" width="1116" height="596" rx="22" fill="url(#card)" stroke="#334155" stroke-width="2"/>

  <text x="78" y="96" class="label">LLM MATCH COMMENTATOR</text>
  <text x="78" y="138" class="title">USA vs Mexico - generated match commentary</text>
  <text x="78" y="170" class="meta">FIFA World Cup 2026 · MetLife Stadium · English + Spanish output from structured events</text>
  <text x="78" y="214" class="code">$ python3 commentator.py  # sample output saved to commentary_output.md</text>

  <rect x="78" y="250" width="1044" height="84" rx="14" fill="#0f172a" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="104" y="284" class="event">18' - Goal</text>
  <text x="104" y="314" class="copy">English: Folarin Balogun rises to meet the corner and powers USA into a 1-0 lead.</text>

  <rect x="78" y="356" width="1044" height="84" rx="14" fill="#0f172a" stroke="#16a34a" stroke-width="1.5"/>
  <text x="104" y="390" class="event">38' - Goal</text>
  <text x="104" y="420" class="copy">Spanish: Raul Jimenez no falla desde los once pasos y empata el partido para Mexico.</text>

  <rect x="78" y="462" width="1044" height="84" rx="14" fill="#0f172a" stroke="#eab308" stroke-width="1.5"/>
  <text x="104" y="496" class="event">74' - Goal</text>
  <text x="104" y="526" class="copy">English: Gio Reyna bursts through the defense and slots home the 2-1 winner.</text>

  <rect x="78" y="568" width="1044" height="38" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="104" y="593" class="accent">Output shape: event stream in, localized commentary markdown out.</text>
</svg>
