name: Sync FIFA World Cup Data

on:
  schedule:
    # Every 5 min (GitHub Actions minimum); the script no-ops outside the
    # tournament window and skips commits when ESPN reports no change.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fifa-world-cup-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync FIFA World Cup source data
        run: node scripts/sync-fifa-world-cup.mjs

      - name: Regenerate visualization assets
        run: node scripts/generate-visualizations.mjs

      - name: Run visualization tests
        run: node --test scripts/*.test.mjs

      - name: Detect generated data changes
        id: changes
        run: |
          if git diff --quiet -- visualizations/source-data.json visualizations/fifa-world-cup-2026.svg visualizations/nba-finals-2026.svg; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated FIFA data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add visualizations/source-data.json visualizations/fifa-world-cup-2026.svg visualizations/nba-finals-2026.svg
          git commit -m "data: sync FIFA World Cup snapshot"
          git push
