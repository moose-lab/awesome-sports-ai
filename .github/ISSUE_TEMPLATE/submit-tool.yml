name: Submit a Tool
description: Suggest a sports AI app, project, dataset, API, library, model, benchmark, event toolkit, or learning resource.
title: "[Tool]: "
labels: ["tool submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Awesome Sports AI.

        Use this form when you want to suggest a tool but do not want to edit the catalog and README yourself. A maintainer can review the suggestion, normalize the category and metadata, and add the entry if it fits the directory.

  - type: input
    id: tool-name
    attributes:
      label: Tool name
      description: What is the public name of the tool, platform, dataset, API, project, model, benchmark, or resource?
      placeholder: "Example: nba_api"
    validations:
      required: true

  - type: input
    id: tool-url
    attributes:
      label: Public URL
      description: Link to the official website, GitHub repository, documentation, dataset page, or paper.
      placeholder: "https://github.com/swar/nba_api"
    validations:
      required: true

  - type: textarea
    id: short-description
    attributes:
      label: Short description
      description: Write one neutral sentence that explains what the tool helps people do.
      placeholder: "Provides a Python client for NBA.com stats endpoints and basketball data workflows."
    validations:
      required: true

  - type: dropdown
    id: suggested-category
    attributes:
      label: Suggested resource category
      description: Pick the best catalog category. Choose "Not sure" if you want maintainers to place it.
      options:
        - Apps & Products
        - Open-Source Projects
        - Datasets/APIs/Feeds
        - Developer Libraries/SDKs
        - AI Models/Components
        - Research Benchmarks
        - Event Toolkits
        - Learning Collections
        - Not sure / maintainer can choose
    validations:
      required: true

  - type: dropdown
    id: sport-tags
    attributes:
      label: Sport tag(s)
      description: Select the smallest accurate set of sport tags.
      multiple: true
      options:
        - Soccer
        - Basketball
        - American Football
        - Baseball/Softball
        - Tennis/Racquet
        - Running/Track
        - Cycling
        - Swimming
        - Ice Hockey
        - Rugby
        - Cricket
        - Volleyball
        - Golf
        - Combat Sports
        - Motorsport
        - Esports
        - Multi-sport
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: ai-capabilities
    attributes:
      label: AI capability tag(s)
      description: Select the core capability or capabilities this tool supports.
      multiple: true
      options:
        - Data ingestion
        - Computer vision
        - Tracking
        - Analytics/modeling
        - LLM/NLP
        - Media generation
        - Training load
        - Operations
        - Simulation/RL
        - Benchmarking
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: openness
    attributes:
      label: Access / openness
      description: Pick the best access label.
      options:
        - open-source
        - open-data
        - open-api
        - free-dev-tier
        - paper-benchmark
        - commercial-reference
        - Not sure
    validations:
      required: true

  - type: textarea
    id: why-it-belongs
    attributes:
      label: Why it belongs here
      description: Briefly explain who would use it and why it is useful for sports builders, analysts, coaches, operators, creators, or researchers.
      placeholder: "Sports data developers can use it to load box scores, schedules, and player data into analysis pipelines."
    validations:
      required: true

  - type: textarea
    id: optional-context
    attributes:
      label: Optional context
      description: Add anything that helps review, such as example projects, docs, known limitations, license details, or similar tools already listed.
      placeholder: "Optional: links to docs, example notebooks, papers, demos, or related tools."
    validations:
      required: false

  - type: checkboxes
    id: quality-checks
    attributes:
      label: Quick quality checks
      description: Confirm these so maintainers can review the suggestion quickly.
      options:
        - label: The link is public and reachable.
          required: true
        - label: The suggestion is directly useful for sports builders, analysts, coaches, operators, creators, or researchers.
          required: true
        - label: The description is neutral and not promotional copy.
          required: true
        - label: I checked that this tool is not already listed in the README or data/catalog.json.
          required: true
