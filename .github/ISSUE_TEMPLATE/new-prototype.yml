name: New Prototype Proposal
description: Propose a new sports AI mono-tool prototype for the builder roadmap.
title: "feat: [sport] [tool-name]"
labels: ["prototype", "good first issue"]
body:
  - type: markdown
    attributes:
      value: |
        ## Sports AI Hub Prototype Proposal

        Use this form to propose a runnable mono-tool that decomposes one enterprise sports AI capability into an open-source script or small app.

  - type: dropdown
    id: sport
    attributes:
      label: Sport
      description: Which sport does this tool target?
      options:
        - Soccer
        - Basketball
        - American Football
        - Baseball/Softball
        - Tennis/Racquet
        - Running/Track
        - Cycling
        - Swimming
        - Ice Hockey
        - Rugby
        - Cricket
        - Volleyball
        - Golf
        - Combat Sports
        - Motorsport
        - Esports
        - Multi-sport
    validations:
      required: true

  - type: dropdown
    id: ai-capability
    attributes:
      label: AI capability
      description: What primary AI capability does this prototype implement?
      options:
        - Data ingestion
        - Computer vision
        - Tracking
        - Analytics/modeling
        - LLM/NLP
        - Media generation
        - Training load
        - Operations
        - Simulation/RL
        - Benchmarking
    validations:
      required: true

  - type: textarea
    id: enterprise-tool
    attributes:
      label: Enterprise capability being decomposed
      description: What expensive or inaccessible professional sports workflow does this replace or make approachable?
      placeholder: "Example: optical tracking workflow for player spacing and defensive attention."
    validations:
      required: true

  - type: textarea
    id: tool-description
    attributes:
      label: Tool description
      description: One paragraph: what does it do, who uses it, what is the input, and what is the output?
      placeholder: "This tool takes a CSV of player X,Y coordinates and outputs a gravity score heatmap PNG."
    validations:
      required: true

  - type: textarea
    id: input-output
    attributes:
      label: Input / output spec
      description: Be specific about file formats and data shapes.
      value: |
        **Input:**
        **Output:**
        **Sample data included:** Yes / No
    validations:
      required: true

  - type: textarea
    id: stack
    attributes:
      label: Proposed tech stack
      description: Python libraries, models, APIs, local tools, or browser dependencies needed.
      placeholder: "Python, OpenCV, pandas, matplotlib"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Contribution checklist
      options:
        - label: I will include sample data so the tool runs without paid external dependencies.
          required: true
        - label: The tool should run end-to-end in under 5 minutes on a standard laptop.
          required: true
        - label: The README will state inputs, outputs, install steps, usage, and extension ideas.
          required: true
        - label: I checked that no existing prototype or catalog entry already covers this capability.
          required: true
